<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SitePulse</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>SitePulse</h1>
    <p class="subtitle">Track your website usage</p>

    <section class="card">
      <h2>Add Website</h2>
      <div class="row">
        <input type="text" id="siteInput" placeholder="example.com">
        <button id="addSiteBtn">Add</button>
      </div>
    </section>

    <section class="card">
      <h2>Tracked Sites</h2>
      <ul id="siteList" class="list"></ul>
    </section>

    <section class="card">
      <h2>Today</h2>
      <ul id="timeList" class="list"></ul>
    </section>

    <section class="card">
      <h2>This Week</h2>
      <ul id="weeklyList" class="list"></ul>
    </section>
  </div>

  <script src="popup.js"></script>
</body>
</html>
