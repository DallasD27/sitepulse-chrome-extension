<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SitePulse</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>SitePulse</h1>

    <section>
      <h2>Add Website</h2>
      <div class="row">
        <input type="text" id="siteInput" placeholder="example.com">
        <button id="addSiteBtn">Add</button>
      </div>
    </section>

    <section>
      <h2>Tracked Sites</h2>
      <ul id="siteList"></ul>
    </section>

    <section>
      <h2>Today's Time</h2>
      <ul id="timeList"></ul>
    </section>
  </div>

  <script src="popup.js"></script>
</body>
</html>
